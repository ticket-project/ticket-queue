name: Queue CI/CD (Docker Hub)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: deploy-ticket-queue
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: azure-queue
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Test and build bootJar
        run: |
          chmod +x ./gradlew
          ./gradlew test bootJar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ticket-queue:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: ${{ secrets.AZURE_VM_PORT || '22' }}
          script: |
            set -e
            sudo mkdir -p /opt/ticket-queue/nginx
            sudo chown -R "$USER:$USER" /opt/ticket-queue

      - name: Upload nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: ${{ secrets.AZURE_VM_PORT || '22' }}
          source: "deploy/nginx/default.conf"
          target: "/opt/ticket-queue"
          strip_components: 1
          overwrite: true

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: ${{ secrets.AZURE_VM_PORT || '22' }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKER_USERNAME }}/ticket-queue:latest"
            DEPLOY_DIR="/opt/ticket-queue"

            cd "$DEPLOY_DIR"
            test -f .env
            test -f docker-compose.yml
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            sudo docker pull "$IMAGE"
            sudo DOCKER_IMAGE="$IMAGE" docker compose -f docker-compose.yml up -d --remove-orphans
            sudo docker image prune -f
