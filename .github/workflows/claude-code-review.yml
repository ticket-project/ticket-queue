name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
  pull_request:
    branches: [ "master", "develop" ]
    types: [opened, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            먼저 아래 문서를 순서대로 읽어 ticket-queue 저장소의 리뷰 규칙과 도메인 맥락을 숙지하세요.
            1. AGENTS.md
            2. README.md
            3. docs/cloudflare-state-api-cache.md
            4. .github/copilot-instructions.md
            5. .github/instructions/code-review.instructions.md
            6. .github/instructions/java-review.instructions.md

            그 다음 공식 code-review 플러그인을 실행합니다.
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || inputs.pr_number }}

            ## 리뷰 작성 규칙
            - 모든 출력은 한국어로 작성합니다.
            - 패치만 보지 말고 주변 코드, 관련 테스트, 설정, 배포 구성을 함께 확인합니다.
            - 대기열 상태 전이, Redis key/TTL, scheduler, JWT/admission token, public state API/CDN cache 흐름을 우선 확인합니다.
            - 만료 처리, 운영 환경 변수 불일치, 보안 검증 누락, 테스트 공백을 우선 확인합니다.
            - 심각도 순서(CRITICAL -> HIGH -> MEDIUM -> LOW)로 정리합니다.
            - 확신이 없는 지적은 "불확실"로 표시합니다.
            - 요청 범위를 벗어난 리팩터링이나 기능 추가는 제안하지 않습니다.
