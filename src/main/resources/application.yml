server:
  port: 8090

spring:
  application:
    name: ticket-queue
  data:
    redis:
      host: ${QUEUE_REDIS_HOST:localhost}
      port: ${QUEUE_REDIS_PORT:6379}
      cluster:
        nodes: ${QUEUE_REDIS_CLUSTER_NODES:}

security:
  jwt:
    issuer: ${JWT_ISSUER:ticket}
    secret-key: ${JWT_SECRET}
  admission:
    issuer: ${ADMISSION_TOKEN_ISSUER:ticket-queue}
    audience: ${ADMISSION_TOKEN_AUDIENCE:ticket-api}
    secret-key: ${ADMISSION_TOKEN_SECRET_KEY:0123456789abcdef0123456789abcdef}

app:
  queue:
    admit-limit-per-tick: ${QUEUE_ADMIT_LIMIT_PER_TICK:50}
    active-ttl: ${QUEUE_ACTIVE_TTL:5m}
    advance-interval-ms: ${QUEUE_ADVANCE_INTERVAL_MS:1000}
    api:
      session-ttl: ${QUEUE_SESSION_TTL:2h}
    redirect:
      ticketing-url-template: ${QUEUE_TICKETING_URL_TEMPLATE:/booking/seat?performanceId={performanceId}}
