server:
  port: 8090

spring:
  application:
    name: ticket-queue
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${DD_SERVICE:ticket-queue}
      env: ${DD_ENV:local}
      version: ${DD_VERSION:local}

security:
  jwt:
    issuer: ${JWT_ISSUER:ticket}
    secret-key: ${JWT_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
  admission:
    secret-key: ${ADMISSION_TOKEN_SECRET_KEY}

app:
  queue:
    queue-token-secret: ${QUEUE_TOKEN_SECRET}
