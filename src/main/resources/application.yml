server:
  port: ${QUEUE_SERVER_PORT:8090}

spring:
  application:
    name: ticket-queue
  data:
    redis:
      host: ${QUEUE_REDIS_HOST:localhost}
      port: ${QUEUE_REDIS_PORT:6379}
      cluster:
        nodes: ${QUEUE_REDIS_CLUSTER_NODES:}

security:
  jwt:
    issuer: ${JWT_ISSUER:ticket}
    secret-key: ${JWT_SECRET_KEY:local-development-access-token-secret-key-32bytes}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
  admission:
    issuer: ${ADMISSION_TOKEN_ISSUER:ticket-queue}
    audience: ${ADMISSION_TOKEN_AUDIENCE:ticket-api}
    secret-key: ${ADMISSION_TOKEN_SECRET_KEY:local-development-admission-secret-key-32bytes}
    expiration-seconds: ${ADMISSION_TOKEN_EXPIRATION_SECONDS:300}

app:
  queue:
    default-level: ${QUEUE_DEFAULT_LEVEL:LEVEL_1}
    default-max-active-users: ${QUEUE_DEFAULT_MAX_ACTIVE_USERS:300}
    default-entry-token-ttl: ${QUEUE_ACTIVE_TTL:5m}
    entry-retention: ${QUEUE_ENTRY_RETENTION:1h}
    advance-interval-ms: ${QUEUE_ADVANCE_INTERVAL_MS:1000}
    api:
      session-ttl: ${QUEUE_SESSION_TTL:1h}
    redirect:
      ticketing-url-template: ${QUEUE_TICKETING_URL_TEMPLATE:/booking/seat?performanceId={performanceId}}