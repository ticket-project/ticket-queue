server:
  port: 8090

spring:
  application:
    name: ticket-queue

security:
  internal-auth:
    issuer: ticket-gateway
    audience: ticket-queue
    secret-key: ${INTERNAL_AUTH_SECRET_KEY}
  admission:
    secret-key: ${ADMISSION_TOKEN_SECRET_KEY}

app:
  queue:
    queue-token-secret: ${QUEUE_TOKEN_SECRET}
