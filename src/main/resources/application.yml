server:
  port: 8090

spring:
  application:
    name: ticket-queue

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

security:
  jwt:
    issuer: ${JWT_ISSUER:ticket}
    secret-key: ${JWT_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
  admission:
    secret-key: ${ADMISSION_TOKEN_SECRET_KEY}

app:
  queue:
    queue-token-secret: ${QUEUE_TOKEN_SECRET}
