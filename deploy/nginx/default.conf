server {
    listen 80;
    server_name queue.oneticket.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name queue.oneticket.site;

    ssl_certificate /etc/letsencrypt/live/queue.oneticket.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/queue.oneticket.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /api/v1/queue/ {
        proxy_pass http://queue:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        return 404;
    }
}
