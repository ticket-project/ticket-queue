services:
  queue:
    image: ${DOCKER_IMAGE:?DOCKER_IMAGE is required}
    container_name: ticket-queue
    restart: unless-stopped
    depends_on:
      - datadog-agent
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_DATA_REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:?REDIS_CLUSTER_NODES is required}
      SPRING_DATA_REDIS_USERNAME: ${REDIS_USERNAME:-default}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SPRING_DATA_REDIS_SSL_ENABLED: ${REDIS_SSL_ENABLED:-true}
      JAVA_TOOL_OPTIONS: -javaagent:/opt/datadog/dd-java-agent.jar
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: ticket-queue
      DD_ENV: ${DD_ENV:-prod}
      DD_SITE: ${DD_SITE:-us5.datadoghq.com}
      DD_VERSION: ${DD_VERSION:-latest}
      DD_LOGS_INJECTION: "true"
      DD_RUNTIME_METRICS_ENABLED: "true"
    expose:
      - "8090"
    labels:
      com.datadoghq.tags.service: ticket-queue
      com.datadoghq.tags.env: ${DD_ENV:-prod}
      com.datadoghq.tags.version: ${DD_VERSION:-latest}
      com.datadoghq.ad.logs: >-
        [{"source":"java","service":"ticket-queue"}]
      com.datadoghq.ad.checks: >-
        {"openmetrics":{"init_config":{},"instances":[{"openmetrics_endpoint":"http://%%host%%:8090/actuator/prometheus","namespace":"ticket_queue","metrics":[".*"]}]}}

  nginx:
    image: nginx:1.27-alpine
    container_name: ticket-queue-nginx
    restart: unless-stopped
    depends_on:
      - queue
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    container_name: datadog-agent
    restart: unless-stopped
    pid: host
    cgroup: host
    environment:
      DD_API_KEY: ${DD_API_KEY:?DD_API_KEY is required}
      DD_SITE: ${DD_SITE:-us5.datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_LOGS_CONFIG_DOCKER_CONTAINER_USE_FILE: "true"
      DD_PROCESS_AGENT_ENABLED: "true"
      DD_CONTAINER_EXCLUDE_LOGS: name:datadog-agent
      DD_ENV: ${DD_ENV:-prod}
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
      REDIS_PORT: ${REDIS_PORT:-10000}
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /proc:/host/proc:ro
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
      - /opt/datadog-agent/run:/opt/datadog-agent/run:rw
      - ./datadog/conf.d/redisdb.d/conf.yaml:/etc/datadog-agent/conf.d/redisdb.d/conf.yaml:ro
